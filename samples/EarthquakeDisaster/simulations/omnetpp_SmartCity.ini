[General]
network = inet.common.earthquake.SmartCity
sim-time-limit = 30s
**.vector-recording  = true
**.scalar-recording  = true
**.vector-record-eventnumbers = false

# Produce vector files, but don't record vectors globally
output-vector-file = "${resultdir}/${configname}-${runnumber}4.vec"
output-scalar-file = "${resultdir}/${configname}-${runnumber}4.sca"

# ----------------------------
# 1) KEEP vectors only for research modules
# ----------------------------

# Edge (all slicing/queue/delay/energy signals)
**.edge*.vector-recording = true
**.edge*.app[0].vector-recording = true
**.edge*.app[0].**.result-recording-modes = vector

**.edge*.app[0].queueDepthURLLC.result-recording-modes = vector
**.edge*.app[0].queueDepthEMBB.result-recording-modes = vector
**.edge*.app[0].queueDepthMMTC.result-recording-modes = vector

**.edge*.app[0].droppedURLLC.result-recording-modes = vector
**.edge*.app[0].droppedEMBB.result-recording-modes = vector
**.edge*.app[0].droppedMMTC.result-recording-modes = vector

# QuakeFailure (failedIots/failedAps vectors)
**.quake.vector-recording = true
**.quake.**.result-recording-modes = vector

# Epicenter SeismicWaveEmitter (waveSentTime vector + originTime last)
**.epicenter.vector-recording = true
**.epicenter.app[0].vector-recording = true
**.epicenter.app[0].**.result-recording-modes = vector

# ----------------------------
# 2) DISABLE IoT UDP packet vectors (prevents bad_alloc)
# ----------------------------
**.iot[*].app[*].vector-recording = false
#**.iot[*].app[*].**.result-recording-modes = count,mean,sum,min,max,histogram,last
**.iot[*].app[*].packetSent.vector-recording = false
**.iot[*].app[*].packetReceived.vector-recording = false
**.iot[*].app[*].packetSent.result-recording-modes = count
**.iot[*].app[*].packetReceived.result-recording-modes = count

# ----------------------------
# 3) ENABLE association mapping (IoT <-> AP) via mgmt/agent
# ----------------------------
*.iot[*].wlan[0].mgmt.vector-recording = true
*.iot[*].wlan[0].mgmt.scalar-recording = true
*.iot[*].wlan[0].agent.vector-recording = true
*.iot[*].wlan[0].agent.scalar-recording = true

*.ap[*].wlan[0].mgmt.vector-recording = true
*.ap[*].wlan[0].mgmt.scalar-recording = true

# ----------------------------
# 4) Keep MAC queue scalars (AP pendingQueue)
# ----------------------------
*.ap[*].wlan[0].mac.dcf.channelAccess.pendingQueue.scalar-recording = true
*.ap[*].wlan[0].mac.dcf.channelAccess.pendingQueue.vector-recording = false

# Done
# -------------------- Base (your current Version1) --------------------
[Config Version1]

*.numIoT = 100
*.numAp = 2

# -------------------- Bringup batching (NO BringupManager module) --------------------
*.batchSize = 10
*.batchGap  = 0.1s
*.baseDelay = 0.5s
*.bringupJitterMax = 0.25s

**.hasIpv4 = true
**.hasIpv6 = false
**.hasUdp  = true
**.arp.typename = "GlobalArp"

*.configurator.assignDisjunctSubnetAddresses = false
*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false
*.configurator.optimizeRoutes   = false

**.wlan[0].radio.radioMediumModule = "medium"
*.medium.typename = "IdealRadioMedium"

**.wlan[0].mac.rtsThreshold = 2346B
**.wlan[*].mac.ackPolicy   = "none"
**.wlan[*].mac.dcf.channelAccess.pendingQueue.packetCapacity = 1000
**.wlan[*].mac.ackTimeout = 50us
**.wlan[*].mac.ctsTimeout = 50us
**.wlan[*].mac.difsTime   = 10us
**.wlan[*].mac.sifsTime   = 5us
**.wlan[*].mac.slotTime   = 5us
**.wlan[*].mac.retryLimit   = 0

**.wlan[*].mac.dcf.channelAccess.contention.cwMin = 3
**.wlan[*].mac.dcf.channelAccess.contention.cwMax = 3

**.wlan[*].radio.transmitter.power              = 20 mW
**.wlan[*].radio.transmitter.communicationRange = 750 m
**.wlan[*].radio.receiver.sensitivity           = -110 dBm
**.wlan[*].radio.receiver.snirThreshold         = -20 dB

*.medium.analogModel.typename = "ScalarAnalogModel"
*.medium.analogModel.ignorePartialInterference = true
*.medium.backgroundNoise.typename = "IsotropicScalarBackgroundNoise"

**.wlan[*].radio.typename = "Ieee80211ScalarRadio"

*.ap[*].wlan[0].radio.channelNumber  = 0
*.iot[*].wlan[0].radio.channelNumber = 0
*.epicenter.wlan[0].radio.channelNumber = 0

*.ap[*].wlan[0].typename      = "Ieee80211Interface"
*.ap[*].wlan[0].mgmt.typename = "Ieee80211MgmtAp"
*.ap[*].wlan[0].mgmt.ssid     = "City6G"
*.ap[*].wlan[0].mac.opMode    = "ac(866Mbps)"
*.ap[*].wlan[0].mgmt.beaconInterval = 1s

*.iot[*].wlan[0].typename         = "Ieee80211Interface"
*.iot[*].wlan[0].mgmt.typename    = "Ieee80211MgmtSta"
*.iot[*].wlan[0].agent.typename   = "Ieee80211AgentSta"
*.iot[*].wlan[0].agent.defaultSsid = "City6G"
*.iot[*].wlan[0].agent.activeScan = false
*.iot[*].wlan[0].mac.opMode       = "ac(866Mbps)"

*.epicenter.wlan[0].typename  = "Ieee80211Interface"
*.epicenter.wlan[0].mgmt.typename = "Ieee80211MgmtSta"
*.epicenter.wlan[0].agent.typename      = "Ieee80211AgentSta"
*.epicenter.wlan[0].agent.defaultSsid   = "City6G"
*.epicenter.wlan[0].mac.opMode          = "ac(866Mbps)"

# Random placement
seed-set = 1
*.iot[*].myX = uniform(100m, 1400m)
*.iot[*].myY = uniform(100m, 800m)
*.ap[*].myapX = uniform(375m, 1125m)
*.ap[*].myapY = uniform(225m, 675m)

*.ap[*].mobility.initialX = uniform(200m, 1325m)
*.ap[*].mobility.initialY = uniform(185m, 750m)

*.ap[*].mobility.typename = "StationaryMobility"
*.ap[*].mobility.initFromDisplayString = false
*.ap[*].mobility.initialZ = 0m

*.epicenter.mobility.typename = "StationaryMobility"
*.epicenter.mobility.initFromDisplayString = false
*.epicenter.mobility.initialX = 200m
*.epicenter.mobility.initialY = 120m
*.epicenter.mobility.initialZ = 0m

*.iot[*].mobility.typename = "StationaryMobility"
*.iot[*].mobility.initFromDisplayString = false
*.iot[*].mobility.initialZ = 0m

# Earthquake params
*.iot[*].epicX   = -80000m
*.iot[*].epicY   = -30000m
*.iot[*].pVel    = 6500 mps
*.iot[*].preLead = uniform(0.1s,0.5s)

*.iot[*].udp.joinLocalMulticastGroups = true

# --- failure module ---
*.quake = DisasterFailure
*.quake.useEpicenterTrigger = true
*.quake.triggerNames = "S-wave,SURF-wave"

# S-wave: 2 IoTs, 0 APs
*.quake.iotCountOnSWave    = 2
*.quake.apCountOnSWave     = 0

# SURF-wave: 6 IoTs, 2 APs
*.quake.iotCountOnSurfWave = 6
*.quake.apCountOnSurfWave  = 2

#*.quake.lambdaPWave = 0
#*.quake.lambdaSWave = 0
#*.quake.lambdaSurfWave = 0

# who can fail
*.quake.iotPattern = "**.iot[*]"
*.quake.apPattern  = "**.ap[*]"
*.quake.wlanIndex  = 0
*.quake.deleteNodes = false

# Ensure failure vectors are recorded
#**.quake.result-recording-modes = vector
**.quake.failedIots.result-recording-modes = vector
**.quake.failedAps.result-recording-modes = vector

**.quake.failedIots.vector-recording = true
**.quake.failedAps.vector-recording = true

# bringupTime = baseDelay + floor(index/batchSize)*batchGap + jitter
*.iot[*].bringupEnabled = true
*.iot[*].bringupTime   = 0.5s + int(index / 100) * 1s
*.iot[*].bringupJitter = uniform(0s, 0.25s)

# -------------------- Edge app baseline --------------------
*.edge*.numApps = 1
*.edge*.app[0].typename       = "inet.common.earthquake.EdgeTriggerAlertApp"
*.edge*.app[0].listenPort     = 5000
*.edge*.app[0].alertPort      = 6000
*.edge*.app[0].groupAddr      = "224.0.0.1"
*.edge*.app[0].ttl            = 1
*.edge*.app[0].sendInterval   = 50us

*.edge*.app[0].startTime = 0s
*.edge*.app[0].stopTime = -1s

*.edge*.app[0].queueCapacity  = 50000
*.edge*.app[0].dropPolicy     = "dropTail"

# Compute model (kept)
*.edge*.app[0].computeUnits = 1e8
*.edge*.app[0].workPerEvent = 5e6
*.edge*.app[0].procDelay    = 2us

*.iot[*].numApps = 4

# URLLC (earthquake detect burst window)
*.iot[*].app[0].typename        = "UdpBasicApp"
*.iot[*].app[0].packetName      = "URLLC_DETECT"
*.iot[*].app[0].messageLength   = 64B
*.iot[*].app[0].localPort       = 7001
*.iot[*].app[0].destAddresses   = "edge" + string(intuniform(0,1))
*.iot[*].app[0].destPort        = 5000
*.iot[*].app[0].sendInterval    = exponential(0.5s)
*.iot[*].app[0].startTime = 0.5s + int(index / 100) * 1s + uniform(0s, 0.25s) + 12s
#*.iot[*].app[0].startTime       = uniform(12.684615s, 13.283077s)

# eMBB background (higher offered load)
*.iot[*].app[1].typename        = "UdpBasicApp"
*.iot[*].app[1].packetName      = "eMBB_DATA"
*.iot[*].app[1].messageLength   = 800B
*.iot[*].app[1].localPort       = 7101
*.iot[*].app[1].destAddresses   = "edge" + string(intuniform(0,1))
*.iot[*].app[1].destPort        = 5000
*.iot[*].app[1].sendInterval    = 5s   # request-rate sweep knob later
*.iot[*].app[1].startTime = 0.5s + int(index / 100) * 1s + uniform(0s, 0.25s) + 0.5s

# mMTC background (low rate, many devices)
*.iot[*].app[2].typename        = "UdpBasicApp"
*.iot[*].app[2].packetName      = "mMTC_TELEMETRY"
*.iot[*].app[2].messageLength   = 64B
*.iot[*].app[2].localPort       = 7201
*.iot[*].app[2].destAddresses   = "edge" + string(intuniform(0,1))
*.iot[*].app[2].destPort        = 5000
*.iot[*].app[2].sendInterval = 10s
*.iot[*].app[2].startTime = 0.5s + int(index / 100) * 1s + uniform(0s, 0.25s) + 0.5s

# multicast receiver (for responses)
*.iot[*].app[3].typename        = "UdpSink"
*.iot[*].app[3].localPort       = 6000
*.iot[*].app[3].printReceived   = false
*.iot[*].app[3].recordStatistics = true

*.epicenter.numApps = 1
*.epicenter.app[0].typename = "DisasterPropogation"
*.epicenter.app[0].vectorName    = "iot"
*.epicenter.app[0].originTime = 0.015385s - 0.0107s
#*.epicenter.app[0].originTime = 20s 
*.epicenter.app[0].epicX = -80000m
*.epicenter.app[0].epicY = -30000m
*.epicenter.app[0].vP    = 6500 mps
*.epicenter.app[0].vS    = 3600 mps
*.epicenter.app[0].vSurf = 3200 mps
*.epicenter.app[0].port  = 7001
*.epicenter.app[0].messageLength = 64B
*.epicenter.app[0].pName    = "P-wave"
*.epicenter.app[0].sName    = "S-wave"
*.epicenter.app[0].surfName = "SURF-wave"

# -------------------- Slicing scenarios (Q4) --------------------
[Config Slicing_Static_NoBorrow]
extends = Version1
*.edge*.app[0].slicingScenario = "staticNoBorrow"
*.edge*.app[0].shareEMBB  = 75
*.edge*.app[0].shareURLLC = 15
*.edge*.app[0].shareMMTC  = 10
*.edge*.app[0].preemptService = false
*.edge*.app[0].preemptBuffer  = false
*.edge*.app[0].preemptAdmission = false

[Config Slicing_Dynamic_Borrow]
extends = Version1
*.edge*.app[0].slicingScenario = "dynamicBorrow"
*.edge*.app[0].shareEMBB  = 75
*.edge*.app[0].shareURLLC = 15
*.edge*.app[0].shareMMTC  = 10
*.edge*.app[0].preemptService = false
*.edge*.app[0].preemptBuffer  = false
*.edge*.app[0].preemptAdmission = false

[Config Slicing_Preempt_ServiceOnly]
extends = Version1
*.edge*.app[0].slicingScenario = "preempt"
*.edge*.app[0].preemptService = true
*.edge*.app[0].preemptBuffer  = false
*.edge*.app[0].preemptAdmission = false

[Config Slicing_Preempt_PushOut]
extends = Version1
*.edge*.app[0].slicingScenario = "preempt"
*.edge*.app[0].preemptService = true
*.edge*.app[0].preemptBuffer  = true
*.edge*.app[0].preemptAdmission = false

[Config Sweep_NumIoT]
extends = Slicing_Dynamic_Borrow
repeat = 1
*.numIoT = ${N=1000,1100,1200,1300,1400,1500,1600,1700,1800,1900,2000}

[Config Sweep_RequestRate]
extends = Slicing_Dynamic_Borrow
repeat = 1
*.numIoT = 100
*.iot[*].app[1].sendInterval = ${I1=0.5s,0.2s,0.1s,0.05s}
*.iot[*].app[2].sendInterval = ${I2=5s,2s,1s,0.5s}



